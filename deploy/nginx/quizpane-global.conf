# This file is installed into /etc/nginx/conf.d/ by bootstrap-ubuntu.sh.
# It must be loaded from nginx's http context, not from a server block.

upstream quizpane_release_proxy {
    server 127.0.0.1:8787;
    keepalive 16;
}

# Release metadata is mutable and is held in release-proxy's own in-memory
# polling state. Large installers are cached and served by the proxy so Range
# requests stay correct.

limit_req_zone $binary_remote_addr zone=quizpane_download:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=quizpane_client_connections:10m;

# This file is installed into /etc/nginx/conf.d/ by bootstrap-ubuntu.sh.
# It must be loaded from nginx's http context, not from a server block.

upstream quizpane_release_proxy {
    server 127.0.0.1:8787;
    keepalive 16;
}

# Only small release metadata responses are cached by nginx. Large installers are
# cached and served by the release-proxy so Range requests stay correct.
proxy_cache_path /var/cache/nginx/quizpane-meta
    levels=1:2
    keys_zone=quizpane_metadata:10m
    inactive=10m
    max_size=50m
    use_temp_path=off;

limit_req_zone $binary_remote_addr zone=quizpane_download:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=quizpane_webhook:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=quizpane_client_connections:10m;

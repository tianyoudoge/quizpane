<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171a20"/>
      <stop offset="1" stop-color="#0e1015"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#94baff"/>
      <stop offset="1" stop-color="#6f86ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity=".32"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7895ca"/>
    </marker>
  </defs>
  <rect width="1200" height="750" rx="38" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="220" fill="#667de8" fill-opacity=".08"/>
  <circle cx="155" cy="690" r="260" fill="#6c9bd8" fill-opacity=".06"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="76" y="94" fill="#f2f5fb" font-size="42" font-weight="700">开放 Provider 协议</text>
    <text x="76" y="135" fill="#9da8ba" font-size="22">把自己的题库服务接入小窗刷题</text>

    <g filter="url(#shadow)">
      <rect x="76" y="232" width="286" height="300" rx="26" fill="#202630" stroke="#354153" stroke-width="2"/>
      <rect x="103" y="269" width="86" height="86" rx="20" fill="#293849"/>
      <path d="M127 297h38v30h-38zM127 335h38v8h-38z" fill="none" stroke="#a9c8ff" stroke-width="5" stroke-linejoin="round"/>
      <text x="103" y="405" fill="#f0f4fb" font-size="28" font-weight="700">你的题库 / 服务</text>
      <text x="103" y="446" fill="#aeb9ca" font-size="20">题目、答案、解析</text>
      <text x="103" y="478" fill="#aeb9ca" font-size="20">本地文件或自有接口</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="457" y="188" width="286" height="388" rx="28" fill="#25283a" stroke="#7083d8" stroke-width="2"/>
      <rect x="492" y="226" width="216" height="52" rx="14" fill="#313756"/>
      <text x="600" y="260" fill="#cad7ff" font-size="20" font-weight="700" text-anchor="middle">Provider Protocol</text>
      <g fill="#e1e7f7" font-size="18" font-family="ui-monospace,Menlo,monospace">
        <text x="495" y="331">provider.initialize</text>
        <text x="495" y="374">catalog.list</text>
        <text x="495" y="417">attempt.create</text>
        <text x="495" y="460">attempt.submit</text>
      </g>
      <line x1="492" y1="347" x2="708" y2="347" stroke="#4f587a"/>
      <line x1="492" y1="390" x2="708" y2="390" stroke="#4f587a"/>
      <line x1="492" y1="433" x2="708" y2="433" stroke="#4f587a"/>
      <text x="600" y="528" fill="#aeb9cf" font-size="18" text-anchor="middle">稳定 JSON RPC 边界</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="838" y="232" width="286" height="300" rx="26" fill="#202630" stroke="#354153" stroke-width="2"/>
      <rect x="865" y="269" width="86" height="86" rx="20" fill="url(#accent)"/>
      <rect x="884" y="287" width="48" height="50" rx="9" fill="#182034"/>
      <path d="M896 306h24M896 318h16" stroke="#b8ceff" stroke-width="4" stroke-linecap="round"/>
      <text x="865" y="405" fill="#f0f4fb" font-size="28" font-weight="700">小窗刷题</text>
      <text x="865" y="446" fill="#aeb9ca" font-size="20">选题、作答、交卷</text>
      <text x="865" y="478" fill="#aeb9ca" font-size="20">复盘与进度保存</text>
    </g>

    <path d="M373 352 C402 352 418 352 445 352" fill="none" stroke="#7895ca" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M827 404 C798 404 782 404 755 404" fill="none" stroke="#7895ca" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="454" y="632" width="292" height="48" rx="24" fill="#1d2631" stroke="#33465d"/>
    <text x="600" y="664" fill="#b7c8e4" font-size="18" text-anchor="middle">开发者可扩展内容来源，不绑定平台</text>
  </g>
</svg>

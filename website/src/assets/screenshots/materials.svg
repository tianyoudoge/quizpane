    <text x="28" y="92" fill="#c7cad2" font-size="18">第 36 / 135 题 · 已作答 0 题</text>
    <rect x="22" y="116" width="596" height="360" rx="16" fill="#30333a"/>
    <text x="42" y="153" fill="#f4f5f7" font-size="19" font-weight="700">（一）阅读以下文字，完成各题。</text>
    <g fill="#eceef2" font-size="18">
      <text x="42" y="193">进一步做好下岗失业人员</text>
      <rect x="305" y="169" width="52" height="31" rx="8" fill="#7164e8" fill-opacity=".25" stroke="#8f83ff"/>
      <text x="312" y="192">【甲】</text>
      <text x="366" y="193">再就业，解决资源型</text>
      <text x="42" y="226">企业历史遗留问题，</text>
      <rect x="232" y="202" width="52" height="31" rx="8" fill="#7164e8" fill-opacity=".25" stroke="#8f83ff"/>
      <text x="239" y="225">【乙】</text>
      <text x="293" y="226">资源枯竭企业平稳退出</text>
      <text x="42" y="259">和社会安定。对资源已经枯竭的城市，要</text>
      <rect x="450" y="235" width="52" height="31" rx="8" fill="#7164e8" fill-opacity=".25" stroke="#8f83ff"/>
      <text x="457" y="258">【丙】</text>
      <text x="42" y="292">有针对性地扶持接续替代产业发展。</text>
      <text x="42" y="337">材料按卡片宽度自动换行；【甲】【乙】【丙】、</text>
      <text x="42" y="370">〔填空〕及原卷下划线均完整保留，材料图</text>
      <text x="42" y="403">可点击打开浮层查看原始尺寸。</text>
    </g>
    <rect x="22" y="500" width="596" height="88" rx="16" fill="#30333a"/>
    <text x="42" y="536" fill="#f2f3f5" font-size="19">根据公文处理法规的要求，A 处的规范写法</text>
    <text x="42" y="568" fill="#f2f3f5" font-size="19">应为：</text>

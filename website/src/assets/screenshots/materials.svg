    <circle cx="51" cy="635" r="16" fill="#777b86" fill-opacity=".45"/><text x="44" y="642" fill="#f2f3f5" font-size="19">A</text>
    <text x="80" y="642" fill="#f2f3f5" font-size="17">国务院《关于促进资源型城市……》</text>
    <text x="320" y="722" fill="#8e94a1" font-size="15" text-anchor="middle">QuizPane 演示题库界面</text>

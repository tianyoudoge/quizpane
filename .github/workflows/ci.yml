name: Build and test QuizPane

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - dev
      - master

permissions:
  contents: read

env:
  QT_VERSION: "6.5.3"

jobs:
  macos:
    name: macOS Apple-Silicon
    runs-on: macos-14
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install cmake ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: clang_64
          modules: qt5compat qtpdf
          cache: true

      - name: Configure
        run: >-
          cmake --preset ci
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci

  windows:
    name: Windows 10 and 11 x64
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify preinstalled build tools
        shell: pwsh
        run: |
          cmake --version
          ninja --version

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qt5compat qtpdf
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset ci `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DQUIZPANE_ENABLE_UNITY_BUILD=OFF

      - name: Build applications first
        run: >-
          cmake --build --preset ci --parallel
          --target quizpane quizpane_bank_studio
          -- -k 0

      - name: Build tests and remaining targets
        # Windows 编译较慢；让 Ninja 继续构建所有独立目标，一轮收集完整错误，
        # 避免修完一个源文件后才在下一轮看到另一个。
        run: cmake --build --preset ci --parallel -- -k 0

      - name: Test
        run: ctest --preset ci

  linux:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl1 libegl1 libx11-dev \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: gcc_64
          modules: qt5compat qtpdf
          cache: true

      - name: Configure
        run: >-
          cmake --preset ci
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build
        run: cmake --build --preset ci --parallel

      - name: Test
        run: ctest --preset ci

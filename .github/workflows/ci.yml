name: Build and test QuizPane

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - master

permissions:
  contents: read

env:
  QT_VERSION: "6.5.3"

jobs:
  macos:
    name: macOS Apple-Silicon
    runs-on: macos-14
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install cmake ninja tesseract tesseract-lang

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: clang_64
          modules: qt5compat qtwebengine
          cache: true

      - name: Configure
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"
          -DQUIZPANE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

  windows:
    name: Windows 10 and 11 x64
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install cmake ninja -y --no-progress
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install tesseract:x64-windows-static-md

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qt5compat qtwebengine
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build/ci -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DQUIZPANE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

  linux:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl1 libegl1 libx11-dev \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libtesseract-dev \
            tesseract-ocr-chi-sim tesseract-ocr-eng

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: gcc_64
          modules: qt5compat qtwebengine
          cache: true

      - name: Configure
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"
          -DQUIZPANE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

name: Release macOS Apple Silicon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build macOS arm64 release
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          sw_vers
          uname -a

      - name: Install build dependencies
        run: brew install cmake ninja qtbase

      - name: Build, test and package
        env:
          QT_PREFIX: ${{ runner.arch == 'ARM64' && '/opt/homebrew/opt/qtbase' || '' }}
          SIGN_IDENTITY: "-"
        run: ./scripts/build-macos.sh

      - name: Generate checksum
        run: |
          cd dist/macos
          shasum -a 256 小窗刷题-macos-arm64.zip > 小窗刷题-macos-arm64.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: quizpane-macos-arm64-${{ github.ref_name }}
          path: |
            dist/macos/小窗刷题-macos-arm64.zip
            dist/macos/小窗刷题-macos-arm64.zip.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/macos/小窗刷题-macos-arm64.zip \
            dist/macos/小窗刷题-macos-arm64.zip.sha256 \
            --title "QuizPane ${GITHUB_REF_NAME}" \
            --generate-notes
